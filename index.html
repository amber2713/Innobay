<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体征与运动数据监测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans selection:bg-cyan-500 selection:text-slate-900">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 rounded-full bg-cyan-500 shadow-[0_0_10px_#06b6d4]"></div>
            <span class="font-mono tracking-wider text-sm text-slate-400">BIOMONITOR // v1.0</span>
        </div>
        <div id="connection-status" class="text-xs font-mono bg-slate-800 px-3 py-1 rounded-full text-rose-400 border border-rose-500/30">
            ● 未连接设备
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-6 max-w-4xl mx-auto w-full">
        
        <section id="step-1" class="w-full max-w-md text-center space-y-8">
            <div class="relative w-48 h-48 mx-auto flex items-center justify-center">
                <div class="absolute inset-0 rounded-full bg-cyan-500/10 border border-cyan-500/30 radar-wave"></div>
                <div class="absolute inset-0 rounded-full bg-cyan-500/5 border border-cyan-500/20 radar-wave" style="animation-delay: 0.6s;"></div>
                <div class="absolute inset-4 rounded-full bg-cyan-950 border border-cyan-500/40 flex items-center justify-center">
                    <svg class="w-12 h-12 text-cyan-400 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M7.53 14.53a6 6 0 018.94 0M13 11a1 1 0 11-2 0 1 1 0 012 0zm7 2.121C19.23 6.512 15.742 3 12 3c-3.743 0-7.23 3.512-8 10.121"></path>
                    </svg>
                </div>
            </div>
            
            <div class="space-y-2">
                <h2 class="text-xl font-medium tracking-wide text-cyan-400">正在搜寻周围的无线设备</h2>
                <p class="text-sm text-slate-400 font-mono" id="search-loader">等待答复信号...</p>
            </div>

            <button id="connect-btn" class="px-6 py-3 bg-cyan-600 hover:bg-cyan-500 text-slate-950 font-medium rounded-lg shadow-lg shadow-cyan-600/20 transition-all cursor-pointer transform active:scale-95">
                模拟连接物理设备
            </button>
        </section>


        <section id="step-2" class="hidden w-full space-y-8 animate-fade-in">
            <div class="text-center space-y-2">
                <h2 class="text-2xl font-semibold tracking-tight">核心数据通道已建立</h2>
                <p class="text-slate-400 text-sm">请选择您需要监测的实时肌肉动力学指标</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                <button id="select-strength-btn" class="group text-left p-6 bg-slate-900 border border-slate-800 hover:border-cyan-500/50 rounded-xl transition-all cursor-pointer hover:shadow-xl hover:shadow-cyan-950/20">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-cyan-950 rounded-lg text-cyan-400 group-hover:bg-cyan-900 transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                        <span class="text-xs font-mono text-slate-500">CHANNEL 01</span>
                    </div>
                    <h3 class="text-lg font-medium text-slate-200 mb-1 group-hover:text-cyan-400">肌肉力量 (Muscle Strength)</h3>
                    <p class="text-sm text-slate-400">实时监测目标肌群的收缩张力、最大输出功率与峰值负载。</p>
                </button>

                <button id="select-fatigue-btn" class="group text-left p-6 bg-slate-900 border border-slate-800 hover:border-emerald-500/50 rounded-xl transition-all cursor-pointer hover:shadow-xl hover:shadow-emerald-950/20">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-emerald-950 rounded-lg text-emerald-400 group-hover:bg-emerald-900 transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2"></path></svg>
                        </div>
                        <span class="text-xs font-mono text-slate-500">CHANNEL 02</span>
                    </div>
                    <h3 class="text-lg font-medium text-slate-200 mb-1 group-hover:text-emerald-400">疲劳度评估 (Fatigue Index)</h3>
                    <p class="text-sm text-slate-400">基于肌电信号积分积（iEMG）与频率下移综合计算疲劳深度。</p>
                </button>
            </div>
        </section>


        <section id="step-3" class="hidden w-full space-y-6">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pb-4 border-b border-slate-800">
                <div>
                    <button id="back-to-types-btn" class="text-xs font-mono text-slate-400 hover:text-cyan-400 flex items-center space-x-1 cursor-pointer">
                        <span>&larr; 返回选择通道</span>
                    </button>
                    <h2 id="dashboard-title" class="text-2xl font-bold mt-1">数据看板</h2>
                </div>
                <div class="flex bg-slate-900 p-1 rounded-lg border border-slate-800 text-xs font-mono">
                    <button id="tab-btn-strength" class="px-3 py-1.5 rounded transition-colors">肌肉力量</button>
                    <button id="tab-btn-fatigue" class="px-3 py-1.5 rounded transition-colors">疲劳度</button>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <div class="text-xs text-slate-400 font-mono mb-1">当前实时值</div>
                    <div class="flex items-baseline space-x-2">
                        <span id="realtime-value" class="text-4xl font-mono font-bold text-cyan-400">0.0</span>
                        <span id="realtime-unit" class="text-xs text-slate-500 font-mono">--</span>
                    </div>
                </div>
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <div class="text-xs text-slate-400 font-mono mb-1">会话峰值 (MAX)</div>
                    <div class="flex items-baseline space-x-2">
                        <span id="max-value" class="text-4xl font-mono font-bold text-slate-300">0.0</span>
                    </div>
                </div>
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <div class="text-xs text-slate-400 font-mono mb-1">系统状态</div>
                    <div class="flex items-center space-x-2 mt-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-ping absolute"></span>
                        <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 relative"></span>
                        <span class="text-sm font-mono text-emerald-400">数据流稳定</span>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-mono text-slate-400">实时波形模拟 (近12次采样)</span>
                    <span class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-slate-400 font-mono">100Hz Sampling</span>
                </div>
                <div class="h-32 flex items-end justify-between gap-2 pt-4 border-b border-slate-800" id="chart-bars-container">
                    </div>
            </div>
        </section>

    </main>

    <footer class="text-center py-6 text-xs font-mono text-slate-600 border-t border-slate-900">
        POWERED BY WEB BLUETOOTH & TAILWIND CSS // 2026
    </footer>

    <script src="style.js"></script>
</body>
</html>
